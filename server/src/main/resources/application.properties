spring.datasource.driver-class-name=org.postgresql.Driver

# JDBC URL can be configured directly via DB_URL or use the Supabase pooler by default.
# Example env overrides:
# DB_URL=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?sslmode=require
# DB_USER=postgres.mrueogwqnbkwarumjlfs
# DB_PASSWORD=<your-db-password>
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?sslmode=require}

spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:change_me}

spring.application.name=spring-boot-essentials
spring.server.port=${SERVER_PORT:8081}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.datasource.hikari.connection-timeout=30000